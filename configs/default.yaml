data:
  raw_dir: data/raw
  processed_dir: data/processed
  perturbation_key: perturbation   # obs column with guide/drug label
  control_label: control
  n_top_genes: 2000
  min_genes: 200
  min_cells: 3
  max_pct_mito: 20.0
  target_sum: 10000.0

split:
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
  seed: 42

model:
  name: baseline_mlp
  latent_dim: 64
  hidden_dims: [512, 256]
  dropout: 0.1

training:
  epochs: 100
  batch_size: 256
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  early_stopping_patience: 10

results_dir: results
